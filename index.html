<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Money Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --surface-0: #f4f2eb;
      --surface-1: #ece9e0;
      --surface-2: #ffffff;
      --text-primary: #1a1a18;
      --text-secondary: #5f5e5a;
      --text-muted: #888780;
      --border: rgba(0,0,0,0.1);
      --border-strong: rgba(0,0,0,0.18);
      --radius: 8px;
      --accent: #378ADD;
      --accent-hover: #185FA5;
      --on-accent: #ffffff;
      --green: #1D9E75;
      --green-bg: #E1F5EE;
      --green-text: #085041;
      --red: #E24B4A;
      --red-bg: #FCEBEB;
      --red-text: #791F1F;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --surface-0: #1a1a18;
        --surface-1: #242421;
        --surface-2: #2c2c2a;
        --text-primary: #f0ede4;
        --text-secondary: #b4b2a9;
        --text-muted: #6b6a66;
        --border: rgba(255,255,255,0.08);
        --border-strong: rgba(255,255,255,0.14);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--surface-0);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: 500; margin-bottom: 1.5rem; }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 1.5rem;
    }
    .metric { background: var(--surface-1); border-radius: var(--radius); padding: 0.85rem 1rem; }
    .metric-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }
    .metric-value { font-size: 22px; font-weight: 500; }
    .metric-value.positive { color: var(--green); }
    .metric-value.negative { color: var(--red); }

    .card {
      background: var(--surface-2);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }
    .card-title { font-size: 15px; font-weight: 500; margin-bottom: 14px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }

    input, select {
      width: 100%; height: 36px; padding: 0 10px;
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius);
      background: var(--surface-1);
      color: var(--text-primary);
      font-size: 14px; font-family: inherit;
      outline: none; transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: var(--accent); }

    /* Type toggle */
    .type-toggle { display: flex; gap: 0; margin-bottom: 12px; border-radius: var(--radius); overflow: hidden; border: 0.5px solid var(--border-strong); width: fit-content; }
    .type-btn {
      padding: 7px 20px; font-size: 14px; font-family: inherit; font-weight: 500;
      border: none; cursor: pointer; background: var(--surface-1); color: var(--text-secondary);
      transition: background 0.15s, color 0.15s;
    }
    .type-btn.expense.active { background: var(--red-bg); color: var(--red-text); }
    .type-btn.income.active  { background: var(--green-bg); color: var(--green-text); }

    button.submit-btn {
      border: none; border-radius: var(--radius);
      padding: 8px 20px; font-size: 14px; font-family: inherit; font-weight: 500;
      cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
      transition: background 0.15s;
    }
    button.submit-btn.expense { background: var(--red); color: #fff; }
    button.submit-btn.expense:hover { background: #c43a39; }
    button.submit-btn.income  { background: var(--green); color: #fff; }
    button.submit-btn.income:hover  { background: #0f6e56; }

    .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-sel { width: auto; height: 30px; font-size: 13px; }

    .exp-item { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
    .exp-item:last-child { border-bottom: none; }
    .exp-badges { display: flex; gap: 5px; flex-shrink: 0; flex-wrap: wrap; }
    .cat-badge { font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
    .type-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .type-dot.income  { background: var(--green); }
    .type-dot.expense { background: var(--red); }

    .exp-desc { flex: 1; font-size: 14px; min-width: 80px; }
    .exp-date { font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
    .exp-amount { font-size: 15px; font-weight: 500; flex-shrink: 0; }
    .exp-amount.income  { color: var(--green); }
    .exp-amount.expense { color: var(--red); }
    .del-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 16px; line-height: 1; padding: 0 4px; flex-shrink: 0; }
    .del-btn:hover { color: var(--red); }

    .empty-msg { text-align: center; color: var(--text-muted); font-size: 14px; padding: 1.5rem 0; }

    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .bar-label { font-size: 13px; color: var(--text-secondary); width: 110px; flex-shrink: 0; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-track { flex: 1; background: var(--surface-1); border-radius: 4px; height: 18px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
    .bar-val { font-size: 13px; color: var(--text-secondary); width: 80px; text-align: right; flex-shrink: 0; }

    /* Groups */
    .groups-add-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .groups-add-row input { flex: 1; }
    .groups-add-row button { background: none; border: 0.5px solid var(--border-strong); border-radius: var(--radius); padding: 0 14px; height: 36px; font-size: 14px; font-family: inherit; cursor: pointer; color: var(--text-primary); white-space: nowrap; display: inline-flex; align-items: center; gap: 5px; }
    .groups-add-row button:hover { background: var(--surface-1); }
    .groups-pills { display: flex; flex-wrap: wrap; gap: 8px; }
    .group-pill { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px 5px 12px; border-radius: 20px; font-size: 13px; font-weight: 500; border: 0.5px solid transparent; }
    .group-pill .pill-del { background: none; border: none; cursor: pointer; opacity: 0.5; font-size: 14px; line-height: 1; padding: 0; color: inherit; display: flex; align-items: center; }
    .group-pill .pill-del:hover { opacity: 1; }
    .no-groups { font-size: 13px; color: var(--text-muted); }

    /* Budgets */
    .budget-form-section { margin-bottom: 16px; }
    .budget-cards { display: flex; flex-direction: column; gap: 10px; }
    .budget-card { border: 0.5px solid var(--border-strong); border-radius: var(--radius); padding: 14px 16px; }
    .budget-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 3px; }
    .budget-card-name { font-size: 14px; font-weight: 600; }
    .budget-card-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
    .budget-amounts { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
    .budget-amounts strong { font-weight: 600; }
    .budget-progress-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .budget-progress-track { flex: 1; height: 6px; background: var(--surface-0); border-radius: 3px; overflow: hidden; }
    .budget-progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
    .budget-progress-pct { font-size: 12px; color: var(--text-muted); width: 34px; text-align: right; flex-shrink: 0; }
    .budget-status { font-size: 13px; font-weight: 500; }
    .budget-status.on-track    { color: var(--green); }
    .budget-status.over-pace   { color: #BA7517; }
    .budget-status.over-budget { color: var(--red); }
    .budget-status.not-started { color: var(--text-secondary); }
    .budget-status.finished    { color: var(--text-secondary); }
    .budget-status.finished-ok { color: var(--green); }
  </style>
</head>
<body>
  <div id="error-banner" style="display:none;background:var(--red-bg);color:var(--red-text);border:0.5px solid #F09595;border-radius:var(--radius);padding:10px 14px;margin-bottom:1rem;font-size:14px;max-width:720px;margin-left:auto;margin-right:auto;"></div>

  <div class="container">
    <h1><i class="ti ti-arrows-exchange" aria-hidden="true"></i> Money Tracker</h1>

    <div class="metrics">
      <div class="metric"><p class="metric-label">Total in</p><p class="metric-value positive" id="m-in">฿0</p></div>
      <div class="metric"><p class="metric-label">Total out</p><p class="metric-value negative" id="m-out">฿0</p></div>
      <div class="metric"><p class="metric-label">Balance</p><p class="metric-value" id="m-balance">฿0</p></div>
      <div class="metric"><p class="metric-label">This month net</p><p class="metric-value" id="m-month">฿0</p></div>
    </div>

    <!-- Groups -->
    <div class="card">
      <p class="card-title"><i class="ti ti-tag" aria-hidden="true"></i> Groups</p>
      <div class="groups-add-row">
        <input type="text" id="inp-group-name" placeholder="New group name (e.g. Travel)" maxlength="40"
               onkeydown="if(event.key==='Enter') addGroup()">
        <button onclick="addGroup()"><i class="ti ti-plus" aria-hidden="true"></i> Add group</button>
      </div>
      <div class="groups-pills" id="groups-pills"><span class="no-groups">No groups yet.</span></div>
    </div>

    <!-- Add transaction -->
    <div class="card">
      <p class="card-title">Add transaction</p>
      <div class="type-toggle">
        <button class="type-btn expense active" onclick="setType('expense')">
          <i class="ti ti-arrow-up" aria-hidden="true"></i> Expense
        </button>
        <button class="type-btn income" onclick="setType('income')">
          <i class="ti ti-arrow-down" aria-hidden="true"></i> Income
        </button>
      </div>
      <div class="form-row">
        <input type="text" id="inp-desc" placeholder="Description">
        <input type="number" id="inp-amount" placeholder="Amount (฿)" min="0" step="0.01">
      </div>
      <div class="form-row">
        <select id="inp-cat"></select>
        <select id="inp-group">
          <option value="">No group (optional)</option>
        </select>
      </div>
      <div class="form-row">
        <input type="date" id="inp-date">
      </div>
      <button class="submit-btn expense" id="submit-btn" onclick="addTransaction()">
        <i class="ti ti-plus" aria-hidden="true"></i> <span id="submit-label">Add expense</span>
      </button>
    </div>

    <!-- Transaction list -->
    <div class="card">
      <div class="list-header">
        <p class="card-title" style="margin:0">Transactions</p>
        <div class="filter-row">
          <select class="filter-sel" id="filter-type" onchange="renderList()">
            <option value="">All</option>
            <option value="expense">Expenses</option>
            <option value="income">Income</option>
          </select>
          <select class="filter-sel" id="filter-group" onchange="renderList()">
            <option value="">All groups</option>
          </select>
          <select class="filter-sel" id="filter-cat" onchange="renderList()">
            <option value="">All categories</option>
          </select>
        </div>
      </div>
      <div id="exp-list"></div>
    </div>

    <!-- Budgets -->
    <div class="card">
      <p class="card-title"><i class="ti ti-wallet" aria-hidden="true"></i> Budgets</p>
      <div class="budget-form-section">
        <div class="form-row">
          <input type="text" id="inp-budget-name" placeholder="Budget name (e.g. July Food)" maxlength="50"
                 onkeydown="if(event.key==='Enter') addBudget()">
          <input type="number" id="inp-budget-amount" placeholder="Total budget (฿)" min="1" step="1">
        </div>
        <div class="form-row">
          <select id="inp-budget-cat"></select>
          <select id="inp-budget-group">
            <option value="">All groups</option>
          </select>
        </div>
        <div class="form-row">
          <div>
            <label style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:4px;">Start date</label>
            <input type="date" id="inp-budget-start">
          </div>
          <div>
            <label style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:4px;">End date</label>
            <input type="date" id="inp-budget-end">
          </div>
        </div>
        <button class="submit-btn income" onclick="addBudget()">
          <i class="ti ti-plus" aria-hidden="true"></i> Set budget
        </button>
      </div>
      <div class="budget-cards" id="budget-cards"></div>
    </div>

    <!-- Timeline chart -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px;">
        <p class="card-title" style="margin:0">Income vs expenses over time</p>
        <div class="type-toggle" id="graph-type-toggle">
          <button class="type-btn income active" onclick="setChartType('line')">Line</button>
          <button class="type-btn expense" onclick="setChartType('bar')">Bar</button>
        </div>
      </div>
      <div class="type-toggle" id="granularity-toggle" style="margin-bottom:14px;">
        <button class="type-btn income active" onclick="setGranularity('daily')">Daily</button>
        <button class="type-btn income" onclick="setGranularity('weekly')">Weekly</button>
        <button class="type-btn income" onclick="setGranularity('monthly')">Monthly</button>
        <button class="type-btn income" onclick="setGranularity('yearly')">Yearly</button>
      </div>
      <div id="chart-timeline-empty" class="empty-msg" style="display:none">No data yet.</div>
      <canvas id="chart-timeline" height="220"></canvas>
    </div>

    <!-- Charts -->
    <div class="card">
      <p class="card-title">Expenses by category</p>
      <div id="chart-exp"></div>
    </div>

    <div class="card">
      <p class="card-title">Income by category</p>
      <div id="chart-inc"></div>
    </div>

    <div class="card">
      <p class="card-title">By group</p>
      <div id="chart-group"></div>
    </div>
  </div>

  <script>
    const EXPENSE_CATS = ['Food & drinks','Transport','Shopping','Bills & utilities','Health','Entertainment','Other'];
    const INCOME_CATS  = ['Salary','Freelance','Business','Investment','Gift','Other'];

    const CAT_COLORS = {
      'Food & drinks': '#1D9E75', 'Transport': '#378ADD', 'Shopping': '#D4537E',
      'Bills & utilities': '#BA7517', 'Health': '#534AB7', 'Entertainment': '#D85A30',
      'Salary': '#1D9E75', 'Freelance': '#378ADD', 'Business': '#534AB7',
      'Investment': '#BA7517', 'Gift': '#D4537E', 'Other': '#888780'
    };
    const CAT_BG = {
      'Food & drinks': '#E1F5EE', 'Transport': '#E6F1FB', 'Shopping': '#FBEAF0',
      'Bills & utilities': '#FAEEDA', 'Health': '#EEEDFE', 'Entertainment': '#FAECE7',
      'Salary': '#E1F5EE', 'Freelance': '#E6F1FB', 'Business': '#EEEDFE',
      'Investment': '#FAEEDA', 'Gift': '#FBEAF0', 'Other': '#F1EFE8'
    };
    const CAT_TEXT = {
      'Food & drinks': '#085041', 'Transport': '#0C447C', 'Shopping': '#72243E',
      'Bills & utilities': '#633806', 'Health': '#3C3489', 'Entertainment': '#712B13',
      'Salary': '#085041', 'Freelance': '#0C447C', 'Business': '#3C3489',
      'Investment': '#633806', 'Gift': '#72243E', 'Other': '#444441'
    };
    const GROUP_PALETTE = [
      { bg: '#E6F1FB', text: '#0C447C', bar: '#378ADD' },
      { bg: '#EEEDFE', text: '#3C3489', bar: '#534AB7' },
      { bg: '#E1F5EE', text: '#085041', bar: '#1D9E75' },
      { bg: '#FAEEDA', text: '#633806', bar: '#BA7517' },
      { bg: '#FBEAF0', text: '#72243E', bar: '#D4537E' },
      { bg: '#FAECE7', text: '#712B13', bar: '#D85A30' },
      { bg: '#EAF3DE', text: '#27500A', bar: '#639922' },
      { bg: '#FCEBEB', text: '#791F1F', bar: '#E24B4A' },
    ];

    let transactions = [];
    let groups       = [];
    let budgets      = [];
    let currentType  = 'expense';

    function groupColor(name) {
      const idx = groups.indexOf(name);
      return GROUP_PALETTE[idx % GROUP_PALETTE.length] || GROUP_PALETTE[0];
    }

    function fmt(n) {
      return '฿' + Math.abs(Number(n)).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
    }

    function showError(msg) {
      const el = document.getElementById('error-banner');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 4000);
    }

    async function api(path, method = 'GET', body = null) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(path, opts);
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `HTTP ${res.status}`);
      }
      return res.json();
    }

    /* ── Type toggle ── */
    function setType(type) {
      currentType = type;
      document.querySelectorAll('.type-btn').forEach(b => {
        b.classList.toggle('active', b.classList.contains(type));
      });
      const btn = document.getElementById('submit-btn');
      const lbl = document.getElementById('submit-label');
      btn.className = `submit-btn ${type}`;
      lbl.textContent = type === 'expense' ? 'Add expense' : 'Add income';
      renderCatOptions();
    }

    function renderCatOptions() {
      const cats = currentType === 'expense' ? EXPENSE_CATS : INCOME_CATS;
      document.getElementById('inp-cat').innerHTML =
        '<option value="">Select category</option>' +
        cats.map(c => `<option>${c}</option>`).join('');
    }

    function renderFilterCats() {
      const all = [...new Set(transactions.map(t => t.cat))].sort();
      document.getElementById('filter-cat').innerHTML =
        '<option value="">All categories</option>' +
        all.map(c => `<option>${c}</option>`).join('');
    }

    /* ── Groups ── */
    async function addGroup() {
      const name = document.getElementById('inp-group-name').value.trim();
      if (!name) return;
      try {
        await api('/api/groups', 'POST', { name });
        groups.push(name);
        document.getElementById('inp-group-name').value = '';
        renderGroups();
      } catch (e) {
        showError(e.message === 'Group already exists' ? 'Group already exists.' : 'Could not add group.');
      }
    }

    async function deleteGroup(name) {
      const has = transactions.some(t => t.group === name);
      if (has && !confirm(`Delete group "${name}"? Transactions tagged with it will become untagged.`)) return;
      try {
        await api(`/api/groups/${encodeURIComponent(name)}`, 'DELETE');
        groups = groups.filter(g => g !== name);
        transactions = transactions.map(t => t.group === name ? { ...t, group: '' } : t);
        renderGroups();
        renderAll();
      } catch (e) {
        showError('Could not delete group.');
      }
    }

    function renderGroups() {
      const el = document.getElementById('groups-pills');
      el.innerHTML = groups.length
        ? groups.map(g => {
            const c = groupColor(g);
            return `<span class="group-pill" style="background:${c.bg};color:${c.text}">
              ${g}
              <button class="pill-del" onclick="deleteGroup('${g.replace(/'/g,"\\'")}')">
                <i class="ti ti-x" aria-hidden="true"></i>
              </button>
            </span>`;
          }).join('')
        : '<span class="no-groups">No groups yet. Add one above.</span>';

      const gs = document.getElementById('inp-group');
      const gf = document.getElementById('filter-group');
      const pv = gs.value, pf = gf.value;
      const opts = groups.map(g => `<option>${g}</option>`).join('');
      gs.innerHTML = '<option value="">No group (optional)</option>' + opts;
      gf.innerHTML = '<option value="">All groups</option>' + opts;
      if (groups.includes(pv)) gs.value = pv;
      if (groups.includes(pf)) gf.value = pf;
      renderBudgetGroupOptions();
    }

    /* ── Transaction CRUD ── */
    async function addTransaction() {
      const desc   = document.getElementById('inp-desc').value.trim();
      const amount = parseFloat(document.getElementById('inp-amount').value);
      const cat    = document.getElementById('inp-cat').value;
      const group  = document.getElementById('inp-group').value;
      const date   = document.getElementById('inp-date').value;

      if (!desc || !amount || amount <= 0 || !cat || !date) {
        alert('Please fill in description, amount, category, and date.');
        return;
      }
      try {
        const row = await api('/api/expenses', 'POST', { type: currentType, desc, amount, cat, group, date });
        transactions.unshift(row);
        document.getElementById('inp-desc').value   = '';
        document.getElementById('inp-amount').value = '';
        document.getElementById('inp-cat').value    = '';
        document.getElementById('inp-group').value  = '';
        renderAll();
      } catch (e) {
        showError('Could not save. Is the server running?');
      }
    }

    async function deleteTransaction(id) {
      try {
        await api(`/api/expenses/${id}`, 'DELETE');
        transactions = transactions.filter(t => t.id !== id);
        renderAll();
      } catch (e) {
        showError('Could not delete transaction.');
      }
    }

    /* ── Render ── */
    function renderList() {
      const fType  = document.getElementById('filter-type').value;
      const fGroup = document.getElementById('filter-group').value;
      const fCat   = document.getElementById('filter-cat').value;
      let rows = transactions;
      if (fType)  rows = rows.filter(t => t.type === fType);
      if (fGroup) rows = rows.filter(t => t.group === fGroup);
      if (fCat)   rows = rows.filter(t => t.cat === fCat);

      const el = document.getElementById('exp-list');
      if (!rows.length) {
        el.innerHTML = '<p class="empty-msg">No transactions match the current filters.</p>';
        return;
      }

      el.innerHTML = rows.map(t => {
        const gc = t.group ? groupColor(t.group) : null;
        const groupBadge = t.group
          ? `<span class="cat-badge" style="background:${gc.bg};color:${gc.text}">${t.group}</span>`
          : '';
        const sign = t.type === 'income' ? '+' : '−';
        return `
        <div class="exp-item">
          <span class="type-dot ${t.type}"></span>
          <div class="exp-badges">
            <span class="cat-badge" style="background:${CAT_BG[t.cat]||'#F1EFE8'};color:${CAT_TEXT[t.cat]||'#444441'}">${t.cat}</span>
            ${groupBadge}
          </div>
          <span class="exp-desc">${t.desc}</span>
          <span class="exp-date">${t.date}</span>
          <span class="exp-amount ${t.type}">${sign}${fmt(t.amount)}</span>
          <button class="del-btn" onclick="deleteTransaction('${t.id}')" aria-label="Delete">
            <i class="ti ti-trash" aria-hidden="true"></i>
          </button>
        </div>`;
      }).join('');
    }

    function renderMetrics() {
      const totalIn  = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
      const totalOut = transactions.filter(t => t.type !== 'income').reduce((s, t) => s + t.amount, 0);
      const balance  = totalIn - totalOut;

      const now = new Date();
      const ym  = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
      const monthIn  = transactions.filter(t => t.type === 'income'   && t.date.startsWith(ym)).reduce((s, t) => s + t.amount, 0);
      const monthOut = transactions.filter(t => t.type !== 'income'   && t.date.startsWith(ym)).reduce((s, t) => s + t.amount, 0);
      const monthNet = monthIn - monthOut;

      document.getElementById('m-in').textContent      = fmt(totalIn);
      document.getElementById('m-out').textContent     = fmt(totalOut);

      const balEl = document.getElementById('m-balance');
      balEl.textContent = (balance >= 0 ? '+' : '−') + fmt(balance);
      balEl.className   = 'metric-value ' + (balance >= 0 ? 'positive' : 'negative');

      const monEl = document.getElementById('m-month');
      monEl.textContent = (monthNet >= 0 ? '+' : '−') + fmt(monthNet);
      monEl.className   = 'metric-value ' + (monthNet >= 0 ? 'positive' : 'negative');
    }

    function renderBarChart(elId, entries, colorFn) {
      const el  = document.getElementById(elId);
      const max = entries[0] ? entries[0][1] : 1;
      if (!entries.length) { el.innerHTML = '<p class="empty-msg">No data yet.</p>'; return; }
      el.innerHTML = entries.map(([label, val]) => `
        <div class="bar-row">
          <span class="bar-label" title="${label}">${label}</span>
          <div class="bar-track">
            <div class="bar-fill" style="width:${Math.round(val/max*100)}%;background:${colorFn(label)}"></div>
          </div>
          <span class="bar-val">${fmt(val)}</span>
        </div>`).join('');
    }

    function renderCharts() {
      const expCats = {}, incCats = {}, grpTotals = {};
      transactions.forEach(t => {
        if (t.type === 'income') incCats[t.cat] = (incCats[t.cat] || 0) + t.amount;
        else                     expCats[t.cat] = (expCats[t.cat] || 0) + t.amount;
        if (t.group) grpTotals[t.group] = (grpTotals[t.group] || 0) + t.amount;
      });
      renderBarChart('chart-exp',   Object.entries(expCats).sort((a,b)=>b[1]-a[1]),   cat  => CAT_COLORS[cat]      || '#888780');
      renderBarChart('chart-inc',   Object.entries(incCats).sort((a,b)=>b[1]-a[1]),   cat  => CAT_COLORS[cat]      || '#888780');
      renderBarChart('chart-group', Object.entries(grpTotals).sort((a,b)=>b[1]-a[1]), name => groupColor(name).bar);
    }

    /* ── Timeline chart ── */
    let timelineChart = null;
    let chartType     = 'line';
    let granularity   = 'daily';

    function setChartType(type) {
      chartType = type;
      document.querySelectorAll('#graph-type-toggle .type-btn').forEach(b => {
        b.classList.toggle('active', b.textContent.trim().toLowerCase() === type);
      });
      renderTimelineChart();
    }

    function setGranularity(g) {
      granularity = g;
      document.querySelectorAll('#granularity-toggle .type-btn').forEach(b => {
        b.classList.toggle('active', b.textContent.trim().toLowerCase() === g);
      });
      renderTimelineChart();
    }

    function getGroupKey(dateStr) {
      if (granularity === 'daily')   return dateStr;
      if (granularity === 'monthly') return dateStr.slice(0, 7);
      if (granularity === 'yearly')  return dateStr.slice(0, 4);
      // weekly — find the Monday of this date's week
      const d = new Date(dateStr + 'T12:00:00');
      const day = d.getDay();
      d.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
      return d.toISOString().slice(0, 10);
    }

    function formatKey(key) {
      if (granularity === 'yearly')  return key;
      if (granularity === 'monthly') return new Date(key + '-02T12:00:00').toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
      const d     = new Date(key + 'T12:00:00');
      const month = d.toLocaleDateString('en-US', { month: 'short' });
      return `${d.getDate()} ${month} ${d.getFullYear()}`;
    }

    function fmtK(val) {
      return '฿' + Number(val).toLocaleString('en-US', { maximumFractionDigits: 0 });
    }

    function renderTimelineChart() {
      const canvas   = document.getElementById('chart-timeline');
      const emptyMsg = document.getElementById('chart-timeline-empty');

      if (!transactions.length) {
        if (timelineChart) { timelineChart.destroy(); timelineChart = null; }
        canvas.style.display   = 'none';
        emptyMsg.style.display = 'block';
        return;
      }

      canvas.style.display   = 'block';
      emptyMsg.style.display = 'none';

      const incByKey = {}, expByKey = {};
      transactions.forEach(t => {
        const key = getGroupKey(t.date);
        if (t.type === 'income') incByKey[key] = (incByKey[key] || 0) + t.amount;
        else                     expByKey[key] = (expByKey[key] || 0) + t.amount;
      });

      const keys        = [...new Set([...Object.keys(incByKey), ...Object.keys(expByKey)])].sort();
      const labels      = keys.map(formatKey);
      const incomeData  = keys.map(k => incByKey[k]  || 0);
      const expenseData = keys.map(k => expByKey[k] || 0);

      const dark      = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const textColor = dark ? '#b4b2a9' : '#5f5e5a';
      const gridColor = dark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.07)';
      const isLine    = chartType === 'line';

      if (timelineChart) { timelineChart.destroy(); timelineChart = null; }

      timelineChart = new Chart(canvas, {
        type: isLine ? 'line' : 'bar',
        data: {
          labels,
          datasets: [
            {
              label: 'Income',  data: incomeData,
              borderColor: '#1D9E75', backgroundColor: isLine ? '#1D9E7525' : '#1D9E7560',
              fill: isLine, tension: 0.35, pointRadius: 4, pointHoverRadius: 6, borderWidth: 2,
              ...(isLine ? {} : { borderWidth: 0, borderRadius: 4 }),
            },
            {
              label: 'Expense', data: expenseData,
              borderColor: '#E24B4A', backgroundColor: isLine ? '#E24B4A25' : '#E24B4A60',
              fill: isLine, tension: 0.35, pointRadius: 4, pointHoverRadius: 6, borderWidth: 2,
              ...(isLine ? {} : { borderWidth: 0, borderRadius: 4 }),
            },
          ]
        },
        options: {
          responsive: true,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { labels: { color: textColor, boxWidth: 12, padding: 16 } },
            tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${fmtK(ctx.parsed.y)}` } }
          },
          scales: {
            x: { ticks: { color: textColor, maxRotation: 45 }, grid: { color: gridColor } },
            y: { beginAtZero: true, ticks: { color: textColor, callback: fmtK }, grid: { color: gridColor } }
          }
        }
      });
    }

    /* ── Budgets ── */
    function renderBudgetCatOptions() {
      document.getElementById('inp-budget-cat').innerHTML =
        '<option value="all">All expenses</option>' +
        EXPENSE_CATS.map(c => `<option>${c}</option>`).join('');
    }

    function renderBudgetGroupOptions() {
      const sel = document.getElementById('inp-budget-group');
      if (!sel) return;
      const pv = sel.value;
      sel.innerHTML = '<option value="">All groups</option>' + groups.map(g => `<option>${g}</option>`).join('');
      if (groups.includes(pv)) sel.value = pv;
    }

    function calcBudget(b) {
      const MS       = 86400000;
      const todayStr = new Date().toISOString().slice(0, 10);
      const start    = new Date(b.start_date + 'T00:00:00');
      const end      = new Date(b.end_date   + 'T00:00:00');
      const today    = new Date(todayStr      + 'T00:00:00');

      const totalDays = Math.round((end - start) / MS) + 1;
      const dailyRate = b.amount / totalDays;

      const notStarted = today < start;
      const isFinished = today > end;
      const isActive   = !notStarted && !isFinished;

      // Days fully completed before today (capped by period)
      const daysCompleted = notStarted ? 0
        : isFinished ? totalDays
        : Math.round((today - start) / MS);
      const daysElapsed = daysCompleted + (isActive ? 1 : 0);

      const match = transactions.filter(t => {
        if (t.type !== 'expense') return false;
        if (t.date < b.start_date || t.date > b.end_date) return false;
        if (b.cat   && b.cat   !== 'all' && t.cat   !== b.cat)   return false;
        if (b.group && b.group !== ''    && t.group  !== b.group) return false;
        return true;
      });

      const actualSpent      = match.reduce((s, t) => s + t.amount, 0);
      const spentBeforeToday = match.filter(t => t.date < todayStr).reduce((s, t) => s + t.amount, 0);
      const spentToday       = match.filter(t => t.date === todayStr).reduce((s, t) => s + t.amount, 0);

      // Carry-over: how much over/under plan from completed days
      const expectedBeforeToday = daysCompleted * dailyRate;
      const carryOver           = spentBeforeToday - expectedBeforeToday; // positive = over plan
      const todayBudget         = dailyRate - carryOver;

      const remaining  = b.amount - actualSpent;
      const overBudget = actualSpent > b.amount;
      const overPace   = carryOver > 0.005; // over plan from carry-over
      const pct        = Math.min(Math.round(actualSpent / b.amount * 100), 100);

      return {
        totalDays, dailyRate, daysElapsed, daysCompleted,
        actualSpent, spentBeforeToday, spentToday,
        carryOver, todayBudget, remaining,
        overBudget, overPace, pct,
        notStarted, isActive, isFinished
      };
    }

    function renderBudgets() {
      const el = document.getElementById('budget-cards');
      if (!budgets.length) {
        el.innerHTML = '<p class="empty-msg">No budgets yet. Set one above.</p>';
        return;
      }

      const fmtD = d => {
        const dt = new Date(d + 'T12:00:00');
        return `${dt.getDate()} ${dt.toLocaleDateString('en-US', { month: 'short' })} ${dt.getFullYear()}`;
      };

      el.innerHTML = budgets.map(b => {
        const s = calcBudget(b);
        const barColor = s.overBudget ? 'var(--red)' : s.overPace ? '#BA7517' : '#1D9E75';

        const filterDesc = [];
        if (b.cat && b.cat !== 'all') filterDesc.push(b.cat);
        if (b.group) filterDesc.push(`Group: ${b.group}`);
        const filterStr = filterDesc.length ? filterDesc.join(' · ') : 'All expenses';

        let statusClass = 'on-track';
        let statusMsg   = '';
        const dayLabel  = `Day ${s.daysElapsed}/${s.totalDays}`;

        if (s.notStarted) {
          const daysUntil = Math.round((new Date(b.start_date + 'T00:00:00') - new Date(new Date().toISOString().slice(0,10) + 'T00:00:00')) / 86400000);
          statusClass = 'not-started';
          statusMsg = `Starts in ${daysUntil} day${daysUntil !== 1 ? 's' : ''} · Target: ${fmt(s.dailyRate)}/day`;
        } else if (s.isFinished) {
          statusClass = s.overBudget ? 'over-budget' : 'finished-ok';
          statusMsg = s.overBudget
            ? `Completed · Over budget by ${fmt(s.actualSpent - b.amount)}`
            : `Completed · Saved ${fmt(s.remaining)}`;
        } else if (s.overBudget) {
          statusClass = 'over-budget';
          statusMsg = `${dayLabel} · Over total budget by ${fmt(s.actualSpent - b.amount)}`;
        } else if (s.overPace) {
          statusClass = 'over-pace';
          statusMsg = s.todayBudget <= 0
            ? `${dayLabel} · Today's allowance used up (−${fmt(-s.todayBudget)} carry-over from overspend)`
            : `${dayLabel} · Today's budget: ${fmt(s.todayBudget)} (−${fmt(s.carryOver)} carry-over from overspend)`;
        } else {
          const surplus = -s.carryOver;
          statusMsg = surplus > 0.005
            ? `${dayLabel} · Today's budget: ${fmt(s.todayBudget)} (+${fmt(surplus)} carry-over from unused days)`
            : `${dayLabel} · Today's budget: ${fmt(s.dailyRate)} · Exactly on base plan`;
        }

        return `
        <div class="budget-card">
          <div class="budget-card-header">
            <div>
              <div class="budget-card-name">${b.name}</div>
              <div class="budget-card-meta">${filterStr} · ${fmtD(b.start_date)} – ${fmtD(b.end_date)}</div>
            </div>
            <button class="del-btn" onclick="deleteBudget('${b.id}')" aria-label="Delete">
              <i class="ti ti-trash" aria-hidden="true"></i>
            </button>
          </div>
          <div class="budget-amounts">
            <span>Spent <strong>${fmt(s.actualSpent)}</strong> of ${fmt(b.amount)}</span>
            <span style="color:var(--text-muted)">base plan: ${fmt(s.dailyRate)}/day</span>
          </div>
          <div class="budget-progress-row">
            <div class="budget-progress-track">
              <div class="budget-progress-fill" style="width:${s.pct}%;background:${barColor}"></div>
            </div>
            <span class="budget-progress-pct">${s.pct}%</span>
          </div>
          <div class="budget-status ${statusClass}">${statusMsg}</div>
        </div>`;
      }).join('');
    }

    async function addBudget() {
      const name   = document.getElementById('inp-budget-name').value.trim();
      const amount = parseFloat(document.getElementById('inp-budget-amount').value);
      const cat    = document.getElementById('inp-budget-cat').value;
      const group  = document.getElementById('inp-budget-group').value;
      const start  = document.getElementById('inp-budget-start').value;
      const end    = document.getElementById('inp-budget-end').value;

      if (!name || !amount || amount <= 0 || !start || !end) {
        alert('Please fill in name, amount, start date, and end date.');
        return;
      }
      if (end < start) {
        alert('End date must be on or after start date.');
        return;
      }
      try {
        const row = await api('/api/budgets', 'POST', { name, amount, cat, group, start_date: start, end_date: end });
        budgets.unshift(row);
        document.getElementById('inp-budget-name').value   = '';
        document.getElementById('inp-budget-amount').value = '';
        renderBudgets();
      } catch (e) {
        showError('Could not save budget.');
      }
    }

    async function deleteBudget(id) {
      if (!confirm('Delete this budget?')) return;
      try {
        await api(`/api/budgets/${id}`, 'DELETE');
        budgets = budgets.filter(b => b.id !== id);
        renderBudgets();
      } catch (e) {
        showError('Could not delete budget.');
      }
    }

    function renderAll() {
      renderMetrics();
      renderGroups();
      renderFilterCats();
      renderList();
      renderBudgets();
      renderCharts();
      renderTimelineChart();
    }

    /* ── Boot ── */
    async function init() {
      const today = new Date().toISOString().slice(0, 10);
      document.getElementById('inp-date').value          = today;
      document.getElementById('inp-budget-start').value  = today;
      const d30 = new Date(); d30.setDate(d30.getDate() + 29);
      document.getElementById('inp-budget-end').value    = d30.toISOString().slice(0, 10);
      renderCatOptions();
      renderBudgetCatOptions();
      try {
        [transactions, groups, budgets] = await Promise.all([
          api('/api/expenses'), api('/api/groups'), api('/api/budgets')
        ]);
        renderAll();
      } catch (e) {
        const el = document.getElementById('error-banner');
        el.textContent = 'Cannot connect to server. Run: venv/bin/uvicorn main:app --reload';
        el.style.display = 'block';
      }
    }

    init();
  </script>
</body>
</html>
