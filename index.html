<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Money Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --surface-0: #f4f2eb;
      --surface-1: #ece9e0;
      --surface-2: #ffffff;
      --text-primary: #1a1a18;
      --text-secondary: #5f5e5a;
      --text-muted: #888780;
      --border: rgba(0,0,0,0.1);
      --border-strong: rgba(0,0,0,0.18);
      --radius: 8px;
      --accent: #378ADD;
      --accent-hover: #185FA5;
      --on-accent: #ffffff;
      --green: #1D9E75;
      --green-bg: #E1F5EE;
      --green-text: #085041;
      --red: #E24B4A;
      --red-bg: #FCEBEB;
      --red-text: #791F1F;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --surface-0: #1a1a18;
        --surface-1: #242421;
        --surface-2: #2c2c2a;
        --text-primary: #f0ede4;
        --text-secondary: #b4b2a9;
        --text-muted: #6b6a66;
        --border: rgba(255,255,255,0.08);
        --border-strong: rgba(255,255,255,0.14);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--surface-0);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: 500; margin-bottom: 1.5rem; }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 1.5rem;
    }
    .metric { background: var(--surface-1); border-radius: var(--radius); padding: 0.85rem 1rem; }
    .metric-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 4px; }
    .metric-value { font-size: 22px; font-weight: 500; }
    .metric-value.positive { color: var(--green); }
    .metric-value.negative { color: var(--red); }

    .card {
      background: var(--surface-2);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }
    .card-title { font-size: 15px; font-weight: 500; margin-bottom: 14px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }

    input, select {
      width: 100%; height: 36px; padding: 0 10px;
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius);
      background: var(--surface-1);
      color: var(--text-primary);
      font-size: 14px; font-family: inherit;
      outline: none; transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: var(--accent); }

    /* Type toggle */
    .type-toggle { display: flex; gap: 0; margin-bottom: 12px; border-radius: var(--radius); overflow: hidden; border: 0.5px solid var(--border-strong); width: fit-content; }
    .type-btn {
      padding: 7px 20px; font-size: 14px; font-family: inherit; font-weight: 500;
      border: none; cursor: pointer; background: var(--surface-1); color: var(--text-secondary);
      transition: background 0.15s, color 0.15s;
    }
    .type-btn.expense.active { background: var(--red-bg); color: var(--red-text); }
    .type-btn.income.active  { background: var(--green-bg); color: var(--green-text); }

    button.submit-btn {
      border: none; border-radius: var(--radius);
      padding: 8px 20px; font-size: 14px; font-family: inherit; font-weight: 500;
      cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
      transition: background 0.15s;
    }
    button.submit-btn.expense { background: var(--red); color: #fff; }
    button.submit-btn.expense:hover { background: #c43a39; }
    button.submit-btn.income  { background: var(--green); color: #fff; }
    button.submit-btn.income:hover  { background: #0f6e56; }

    .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-sel { width: auto; height: 30px; font-size: 13px; }

    .exp-item { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
    .exp-item:last-child { border-bottom: none; }
    .exp-badges { display: flex; gap: 5px; flex-shrink: 0; flex-wrap: wrap; }
    .cat-badge { font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
    .type-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .type-dot.income  { background: var(--green); }
    .type-dot.expense { background: var(--red); }

    .exp-desc { flex: 1; font-size: 14px; min-width: 80px; }
    .exp-date { font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
    .exp-amount { font-size: 15px; font-weight: 500; flex-shrink: 0; }
    .exp-amount.income  { color: var(--green); }
    .exp-amount.expense { color: var(--red); }
    .del-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 16px; line-height: 1; padding: 0 4px; flex-shrink: 0; }
    .del-btn:hover { color: var(--red); }

    .empty-msg { text-align: center; color: var(--text-muted); font-size: 14px; padding: 1.5rem 0; }

    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .bar-label { font-size: 13px; color: var(--text-secondary); width: 110px; flex-shrink: 0; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-track { flex: 1; background: var(--surface-1); border-radius: 4px; height: 18px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
    .bar-val { font-size: 13px; color: var(--text-secondary); width: 80px; text-align: right; flex-shrink: 0; }

    /* Groups */
    .groups-add-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .groups-add-row input { flex: 1; }
    .groups-add-row button { background: none; border: 0.5px solid var(--border-strong); border-radius: var(--radius); padding: 0 14px; height: 36px; font-size: 14px; font-family: inherit; cursor: pointer; color: var(--text-primary); white-space: nowrap; display: inline-flex; align-items: center; gap: 5px; }
    .groups-add-row button:hover { background: var(--surface-1); }
    .groups-pills { display: flex; flex-wrap: wrap; gap: 8px; }
    .group-pill { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px 5px 12px; border-radius: 20px; font-size: 13px; font-weight: 500; border: 0.5px solid transparent; }
    .group-pill .pill-del { background: none; border: none; cursor: pointer; opacity: 0.5; font-size: 14px; line-height: 1; padding: 0; color: inherit; display: flex; align-items: center; }
    .group-pill .pill-del:hover { opacity: 1; }
    .no-groups { font-size: 13px; color: var(--text-muted); }
  </style>
</head>
<body>
  <div id="error-banner" style="display:none;background:var(--red-bg);color:var(--red-text);border:0.5px solid #F09595;border-radius:var(--radius);padding:10px 14px;margin-bottom:1rem;font-size:14px;max-width:720px;margin-left:auto;margin-right:auto;"></div>

  <div class="container">
    <h1><i class="ti ti-arrows-exchange" aria-hidden="true"></i> Money Tracker</h1>

    <div class="metrics">
      <div class="metric"><p class="metric-label">Total in</p><p class="metric-value positive" id="m-in">฿0</p></div>
      <div class="metric"><p class="metric-label">Total out</p><p class="metric-value negative" id="m-out">฿0</p></div>
      <div class="metric"><p class="metric-label">Balance</p><p class="metric-value" id="m-balance">฿0</p></div>
      <div class="metric"><p class="metric-label">This month net</p><p class="metric-value" id="m-month">฿0</p></div>
    </div>

    <!-- Groups -->
    <div class="card">
      <p class="card-title"><i class="ti ti-tag" aria-hidden="true"></i> Groups</p>
      <div class="groups-add-row">
        <input type="text" id="inp-group-name" placeholder="New group name (e.g. Travel)" maxlength="40"
               onkeydown="if(event.key==='Enter') addGroup()">
        <button onclick="addGroup()"><i class="ti ti-plus" aria-hidden="true"></i> Add group</button>
      </div>
      <div class="groups-pills" id="groups-pills"><span class="no-groups">No groups yet.</span></div>
    </div>

    <!-- Add transaction -->
    <div class="card">
      <p class="card-title">Add transaction</p>
      <div class="type-toggle">
        <button class="type-btn expense active" onclick="setType('expense')">
          <i class="ti ti-arrow-up" aria-hidden="true"></i> Expense
        </button>
        <button class="type-btn income" onclick="setType('income')">
          <i class="ti ti-arrow-down" aria-hidden="true"></i> Income
        </button>
      </div>
      <div class="form-row">
        <input type="text" id="inp-desc" placeholder="Description">
        <input type="number" id="inp-amount" placeholder="Amount (฿)" min="0" step="0.01">
      </div>
      <div class="form-row">
        <select id="inp-cat"></select>
        <select id="inp-group">
          <option value="">No group (optional)</option>
        </select>
      </div>
      <div class="form-row">
        <input type="date" id="inp-date">
      </div>
      <button class="submit-btn expense" id="submit-btn" onclick="addTransaction()">
        <i class="ti ti-plus" aria-hidden="true"></i> <span id="submit-label">Add expense</span>
      </button>
    </div>

    <!-- Transaction list -->
    <div class="card">
      <div class="list-header">
        <p class="card-title" style="margin:0">Transactions</p>
        <div class="filter-row">
          <select class="filter-sel" id="filter-type" onchange="renderList()">
            <option value="">All</option>
            <option value="expense">Expenses</option>
            <option value="income">Income</option>
          </select>
          <select class="filter-sel" id="filter-group" onchange="renderList()">
            <option value="">All groups</option>
          </select>
          <select class="filter-sel" id="filter-cat" onchange="renderList()">
            <option value="">All categories</option>
          </select>
        </div>
      </div>
      <div id="exp-list"></div>
    </div>

    <!-- Charts -->
    <div class="card">
      <p class="card-title">Expenses by category</p>
      <div id="chart-exp"></div>
    </div>

    <div class="card">
      <p class="card-title">Income by category</p>
      <div id="chart-inc"></div>
    </div>

    <div class="card">
      <p class="card-title">By group</p>
      <div id="chart-group"></div>
    </div>
  </div>

  <script>
    const EXPENSE_CATS = ['Food & drinks','Transport','Shopping','Bills & utilities','Health','Entertainment','Other'];
    const INCOME_CATS  = ['Salary','Freelance','Business','Investment','Gift','Other'];

    const CAT_COLORS = {
      'Food & drinks': '#1D9E75', 'Transport': '#378ADD', 'Shopping': '#D4537E',
      'Bills & utilities': '#BA7517', 'Health': '#534AB7', 'Entertainment': '#D85A30',
      'Salary': '#1D9E75', 'Freelance': '#378ADD', 'Business': '#534AB7',
      'Investment': '#BA7517', 'Gift': '#D4537E', 'Other': '#888780'
    };
    const CAT_BG = {
      'Food & drinks': '#E1F5EE', 'Transport': '#E6F1FB', 'Shopping': '#FBEAF0',
      'Bills & utilities': '#FAEEDA', 'Health': '#EEEDFE', 'Entertainment': '#FAECE7',
      'Salary': '#E1F5EE', 'Freelance': '#E6F1FB', 'Business': '#EEEDFE',
      'Investment': '#FAEEDA', 'Gift': '#FBEAF0', 'Other': '#F1EFE8'
    };
    const CAT_TEXT = {
      'Food & drinks': '#085041', 'Transport': '#0C447C', 'Shopping': '#72243E',
      'Bills & utilities': '#633806', 'Health': '#3C3489', 'Entertainment': '#712B13',
      'Salary': '#085041', 'Freelance': '#0C447C', 'Business': '#3C3489',
      'Investment': '#633806', 'Gift': '#72243E', 'Other': '#444441'
    };
    const GROUP_PALETTE = [
      { bg: '#E6F1FB', text: '#0C447C', bar: '#378ADD' },
      { bg: '#EEEDFE', text: '#3C3489', bar: '#534AB7' },
      { bg: '#E1F5EE', text: '#085041', bar: '#1D9E75' },
      { bg: '#FAEEDA', text: '#633806', bar: '#BA7517' },
      { bg: '#FBEAF0', text: '#72243E', bar: '#D4537E' },
      { bg: '#FAECE7', text: '#712B13', bar: '#D85A30' },
      { bg: '#EAF3DE', text: '#27500A', bar: '#639922' },
      { bg: '#FCEBEB', text: '#791F1F', bar: '#E24B4A' },
    ];

    let transactions = [];
    let groups       = [];
    let currentType  = 'expense';

    function groupColor(name) {
      const idx = groups.indexOf(name);
      return GROUP_PALETTE[idx % GROUP_PALETTE.length] || GROUP_PALETTE[0];
    }

    function fmt(n) {
      return '฿' + Math.abs(Number(n)).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 2 });
    }

    function showError(msg) {
      const el = document.getElementById('error-banner');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 4000);
    }

    async function api(path, method = 'GET', body = null) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(path, opts);
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `HTTP ${res.status}`);
      }
      return res.json();
    }

    /* ── Type toggle ── */
    function setType(type) {
      currentType = type;
      document.querySelectorAll('.type-btn').forEach(b => {
        b.classList.toggle('active', b.classList.contains(type));
      });
      const btn = document.getElementById('submit-btn');
      const lbl = document.getElementById('submit-label');
      btn.className = `submit-btn ${type}`;
      lbl.textContent = type === 'expense' ? 'Add expense' : 'Add income';
      renderCatOptions();
    }

    function renderCatOptions() {
      const cats = currentType === 'expense' ? EXPENSE_CATS : INCOME_CATS;
      document.getElementById('inp-cat').innerHTML =
        '<option value="">Select category</option>' +
        cats.map(c => `<option>${c}</option>`).join('');
    }

    function renderFilterCats() {
      const all = [...new Set(transactions.map(t => t.cat))].sort();
      document.getElementById('filter-cat').innerHTML =
        '<option value="">All categories</option>' +
        all.map(c => `<option>${c}</option>`).join('');
    }

    /* ── Groups ── */
    async function addGroup() {
      const name = document.getElementById('inp-group-name').value.trim();
      if (!name) return;
      try {
        await api('/api/groups', 'POST', { name });
        groups.push(name);
        document.getElementById('inp-group-name').value = '';
        renderGroups();
      } catch (e) {
        showError(e.message === 'Group already exists' ? 'Group already exists.' : 'Could not add group.');
      }
    }

    async function deleteGroup(name) {
      const has = transactions.some(t => t.group === name);
      if (has && !confirm(`Delete group "${name}"? Transactions tagged with it will become untagged.`)) return;
      try {
        await api(`/api/groups/${encodeURIComponent(name)}`, 'DELETE');
        groups = groups.filter(g => g !== name);
        transactions = transactions.map(t => t.group === name ? { ...t, group: '' } : t);
        renderGroups();
        renderAll();
      } catch (e) {
        showError('Could not delete group.');
      }
    }

    function renderGroups() {
      const el = document.getElementById('groups-pills');
      el.innerHTML = groups.length
        ? groups.map(g => {
            const c = groupColor(g);
            return `<span class="group-pill" style="background:${c.bg};color:${c.text}">
              ${g}
              <button class="pill-del" onclick="deleteGroup('${g.replace(/'/g,"\\'")}')">
                <i class="ti ti-x" aria-hidden="true"></i>
              </button>
            </span>`;
          }).join('')
        : '<span class="no-groups">No groups yet. Add one above.</span>';

      const gs = document.getElementById('inp-group');
      const gf = document.getElementById('filter-group');
      const pv = gs.value, pf = gf.value;
      const opts = groups.map(g => `<option>${g}</option>`).join('');
      gs.innerHTML = '<option value="">No group (optional)</option>' + opts;
      gf.innerHTML = '<option value="">All groups</option>' + opts;
      if (groups.includes(pv)) gs.value = pv;
      if (groups.includes(pf)) gf.value = pf;
    }

    /* ── Transaction CRUD ── */
    async function addTransaction() {
      const desc   = document.getElementById('inp-desc').value.trim();
      const amount = parseFloat(document.getElementById('inp-amount').value);
      const cat    = document.getElementById('inp-cat').value;
      const group  = document.getElementById('inp-group').value;
      const date   = document.getElementById('inp-date').value;

      if (!desc || !amount || amount <= 0 || !cat || !date) {
        alert('Please fill in description, amount, category, and date.');
        return;
      }
      try {
        const row = await api('/api/expenses', 'POST', { type: currentType, desc, amount, cat, group, date });
        transactions.unshift(row);
        document.getElementById('inp-desc').value   = '';
        document.getElementById('inp-amount').value = '';
        document.getElementById('inp-cat').value    = '';
        document.getElementById('inp-group').value  = '';
        renderAll();
      } catch (e) {
        showError('Could not save. Is the server running?');
      }
    }

    async function deleteTransaction(id) {
      try {
        await api(`/api/expenses/${id}`, 'DELETE');
        transactions = transactions.filter(t => t.id !== id);
        renderAll();
      } catch (e) {
        showError('Could not delete transaction.');
      }
    }

    /* ── Render ── */
    function renderList() {
      const fType  = document.getElementById('filter-type').value;
      const fGroup = document.getElementById('filter-group').value;
      const fCat   = document.getElementById('filter-cat').value;
      let rows = transactions;
      if (fType)  rows = rows.filter(t => t.type === fType);
      if (fGroup) rows = rows.filter(t => t.group === fGroup);
      if (fCat)   rows = rows.filter(t => t.cat === fCat);

      const el = document.getElementById('exp-list');
      if (!rows.length) {
        el.innerHTML = '<p class="empty-msg">No transactions match the current filters.</p>';
        return;
      }

      el.innerHTML = rows.map(t => {
        const gc = t.group ? groupColor(t.group) : null;
        const groupBadge = t.group
          ? `<span class="cat-badge" style="background:${gc.bg};color:${gc.text}">${t.group}</span>`
          : '';
        const sign = t.type === 'income' ? '+' : '−';
        return `
        <div class="exp-item">
          <span class="type-dot ${t.type}"></span>
          <div class="exp-badges">
            <span class="cat-badge" style="background:${CAT_BG[t.cat]||'#F1EFE8'};color:${CAT_TEXT[t.cat]||'#444441'}">${t.cat}</span>
            ${groupBadge}
          </div>
          <span class="exp-desc">${t.desc}</span>
          <span class="exp-date">${t.date}</span>
          <span class="exp-amount ${t.type}">${sign}${fmt(t.amount)}</span>
          <button class="del-btn" onclick="deleteTransaction('${t.id}')" aria-label="Delete">
            <i class="ti ti-trash" aria-hidden="true"></i>
          </button>
        </div>`;
      }).join('');
    }

    function renderMetrics() {
      const totalIn  = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
      const totalOut = transactions.filter(t => t.type !== 'income').reduce((s, t) => s + t.amount, 0);
      const balance  = totalIn - totalOut;

      const now = new Date();
      const ym  = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
      const monthIn  = transactions.filter(t => t.type === 'income'   && t.date.startsWith(ym)).reduce((s, t) => s + t.amount, 0);
      const monthOut = transactions.filter(t => t.type !== 'income'   && t.date.startsWith(ym)).reduce((s, t) => s + t.amount, 0);
      const monthNet = monthIn - monthOut;

      document.getElementById('m-in').textContent      = fmt(totalIn);
      document.getElementById('m-out').textContent     = fmt(totalOut);

      const balEl = document.getElementById('m-balance');
      balEl.textContent = (balance >= 0 ? '+' : '−') + fmt(balance);
      balEl.className   = 'metric-value ' + (balance >= 0 ? 'positive' : 'negative');

      const monEl = document.getElementById('m-month');
      monEl.textContent = (monthNet >= 0 ? '+' : '−') + fmt(monthNet);
      monEl.className   = 'metric-value ' + (monthNet >= 0 ? 'positive' : 'negative');
    }

    function renderBarChart(elId, entries, colorFn) {
      const el  = document.getElementById(elId);
      const max = entries[0] ? entries[0][1] : 1;
      if (!entries.length) { el.innerHTML = '<p class="empty-msg">No data yet.</p>'; return; }
      el.innerHTML = entries.map(([label, val]) => `
        <div class="bar-row">
          <span class="bar-label" title="${label}">${label}</span>
          <div class="bar-track">
            <div class="bar-fill" style="width:${Math.round(val/max*100)}%;background:${colorFn(label)}"></div>
          </div>
          <span class="bar-val">${fmt(val)}</span>
        </div>`).join('');
    }

    function renderCharts() {
      const expCats = {}, incCats = {}, grpTotals = {};
      transactions.forEach(t => {
        if (t.type === 'income') incCats[t.cat] = (incCats[t.cat] || 0) + t.amount;
        else                     expCats[t.cat] = (expCats[t.cat] || 0) + t.amount;
        if (t.group) grpTotals[t.group] = (grpTotals[t.group] || 0) + t.amount;
      });
      renderBarChart('chart-exp',   Object.entries(expCats).sort((a,b)=>b[1]-a[1]),   cat  => CAT_COLORS[cat]      || '#888780');
      renderBarChart('chart-inc',   Object.entries(incCats).sort((a,b)=>b[1]-a[1]),   cat  => CAT_COLORS[cat]      || '#888780');
      renderBarChart('chart-group', Object.entries(grpTotals).sort((a,b)=>b[1]-a[1]), name => groupColor(name).bar);
    }

    function renderAll() {
      renderMetrics();
      renderGroups();
      renderFilterCats();
      renderList();
      renderCharts();
    }

    /* ── Boot ── */
    async function init() {
      document.getElementById('inp-date').value = new Date().toISOString().slice(0, 10);
      renderCatOptions();
      try {
        [transactions, groups] = await Promise.all([api('/api/expenses'), api('/api/groups')]);
        renderAll();
      } catch (e) {
        const el = document.getElementById('error-banner');
        el.textContent = 'Cannot connect to server. Run: venv/bin/uvicorn main:app --reload';
        el.style.display = 'block';
      }
    }

    init();
  </script>
</body>
</html>
